name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system deps for Prophet
        run: |
          sudo apt-get update
          sudo apt-get install -y libomp-dev build-essential

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint imports (no syntax errors)
        run: |
          python -m py_compile $(git ls-files '*.py')

      - name: Run unit tests (no model files needed — API tests auto-skip)
        run: |
          pytest tests/ -v --tb=short

      - name: Smoke-train one state (sanity check)
        run: |
          python run_training.py --states California
          test -f models/model_registry.joblib

      - name: Re-run tests with models present (full coverage)
        run: |
          pytest tests/ -v --tb=short
