project:
  name: Sales Forecasting System
  version: 1.0.0
  random_seed: 42
data:
  raw_path: training_data/Forecasting Case- Study.xlsx
  date_column: Date
  target_column: sales
  state_column: State
  resample_freq: W
  forecast_horizon: 8
train:
  test_size: 0.2
  min_train_size: 50
features:
  lags:
  - 1
  - 2
  - 4
  - 8
  - 13
  - 26
  rolling_windows:
  - 4
  - 8
  - 13
  holiday_country: US
models:
  arima:
    max_p: 3
    max_q: 3
    max_d: 2
    seasonal: false
  sarima:
    order:
    - 1
    - 1
    - 1
    seasonal_order:
    - 1
    - 1
    - 1
    - 52
  xgboost:
    n_estimators: 300
    max_depth: 4
    learning_rate: 0.18043311207136262
    subsample: 0.9100531293444458
    colsample_bytree: 0.8277250010609204
    random_state: 42
    min_child_weight: 5
    reg_alpha: 0.6842330265121569
    reg_lambda: 1.5002874126238674
  lstm:
    sequence_length: 26
    hidden_size: 64
    num_layers: 2
    dropout: 0.2
    epochs: 100
    batch_size: 16
    learning_rate: 0.001
    patience: 15
  prophet:
    yearly_seasonality: true
    weekly_seasonality: true
    daily_seasonality: false
    changepoint_prior_scale: 0.05
    seasonality_prior_scale: 10.0
paths:
  models_dir: models
  logs_dir: logs
api:
  host: 0.0.0.0
  port: 8000
  title: Sales Forecasting API
  description: Production-grade 8-week ahead sales forecasting per US state
  version: 1.0.0
  cors_origins:
  - '*'
  cors_allow_credentials: false
